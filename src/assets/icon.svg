<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient with subtle depth -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141B2D"/>
      <stop offset="100%" stop-color="#0A0C10"/>
    </linearGradient>

    <!-- Z bolt main gradient -->
    <linearGradient id="bolt" x1="170" y1="100" x2="350" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8EACFF"/>
      <stop offset="40%" stop-color="#4D7CFF"/>
      <stop offset="100%" stop-color="#2A45B3"/>
    </linearGradient>

    <!-- Z bolt highlight edge (top-left lit) -->
    <linearGradient id="boltHighlight" x1="180" y1="100" x2="300" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Pulse line gradient -->
    <linearGradient id="pulse" x1="50" y1="256" x2="462" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00F5D4" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#00F5D4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for the dot -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft ambient glow behind Z -->
    <radialGradient id="ambientGlow" cx="256" cy="256" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4D7CFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4D7CFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle inner shadow on background -->
    <radialGradient id="vignette" cx="256" cy="256" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Speed line gradient -->
    <linearGradient id="speedFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4D7CFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4D7CFF" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#vignette)"/>

  <!-- Ambient glow behind Z -->
  <circle cx="260" cy="260" r="180" fill="url(#ambientGlow)"/>

  <!-- Time-series pulse line (behind Z) -->
  <polyline
    points="50,320 100,320 135,230 170,350 215,170 260,300 300,210 340,275 385,240 430,260 462,260"
    stroke="url(#pulse)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
  <!-- Pulse line glow layer -->
  <polyline
    points="50,320 100,320 135,230 170,350 215,170 260,300 300,210 340,275 385,240 430,260 462,260"
    stroke="#00F5D4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.04"/>

  <!-- Speed lines (left, fading in) -->
  <line x1="62" y1="195" x2="145" y2="195" stroke="url(#speedFade)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="78" y1="230" x2="145" y2="230" stroke="url(#speedFade)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="265" x2="145" y2="265" stroke="url(#speedFade)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="78" y1="300" x2="145" y2="300" stroke="url(#speedFade)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="335" x2="145" y2="335" stroke="url(#speedFade)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Z bolt — shadow -->
  <path
    d="M192,118 L342,118 Q348,118 348,124 L348,154 Q348,158 344,162 L240,332 L346,332 Q352,332 352,338 L352,394 Q352,400 346,400 L174,400 Q168,400 168,394 L168,362 Q168,358 171,354 L280,182 L192,182 Q186,182 186,176 L186,124 Q186,118 192,118 Z"
    fill="#000000" opacity="0.3" transform="translate(4,4)"/>

  <!-- Z bolt — main shape with rounded corners -->
  <path
    d="M192,118 L342,118 Q348,118 348,124 L348,154 Q348,158 344,162 L240,332 L346,332 Q352,332 352,338 L352,394 Q352,400 346,400 L174,400 Q168,400 168,394 L168,362 Q168,358 171,354 L280,182 L192,182 Q186,182 186,176 L186,124 Q186,118 192,118 Z"
    fill="url(#bolt)"/>

  <!-- Z bolt — highlight overlay (top-left lit edge) -->
  <path
    d="M192,118 L342,118 Q348,118 348,124 L348,154 Q348,158 344,162 L240,332 L346,332 Q352,332 352,338 L352,394 Q352,400 346,400 L174,400 Q168,400 168,394 L168,362 Q168,358 171,354 L280,182 L192,182 Q186,182 186,176 L186,124 Q186,118 192,118 Z"
    fill="url(#boltHighlight)"/>

  <!-- Glow dot at top-right of Z -->
  <circle cx="348" cy="118" r="10" fill="#00F5D4" filter="url(#glow)" opacity="0.85"/>
  <!-- Inner bright core of dot -->
  <circle cx="348" cy="118" r="4" fill="#FFFFFF" opacity="0.9"/>

  <!-- Subtle data dots along pulse line -->
  <circle cx="215" cy="170" r="3.5" fill="#00F5D4" opacity="0.5"/>
  <circle cx="300" cy="210" r="3" fill="#00F5D4" opacity="0.35"/>
  <circle cx="385" cy="240" r="3.5" fill="#00F5D4" opacity="0.5"/>
</svg>
