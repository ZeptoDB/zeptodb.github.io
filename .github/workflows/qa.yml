name: Site QA

on:
  pull_request:
  workflow_dispatch:
    inputs:
      source_ref:
        description: ZeptoDB branch, tag, or SHA to validate with this site revision
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout ZeptoDB main
        uses: actions/checkout@v4
        with:
          repository: ZeptoDB/ZeptoDB
          ref: ${{ inputs.source_ref || 'main' }}
          path: zeptodb-source
          sparse-checkout: docs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integrated site QA
        run: pnpm qa
        env:
          ZEPTODB_DOCS_PATH: zeptodb-source/docs
          ZEPTODB_SOURCE_REF: ${{ inputs.source_ref || 'main' }}

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
