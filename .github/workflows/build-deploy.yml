name: Build & Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout ZeptoDB docs
        uses: actions/checkout@v4
        with:
          repository: ZeptoDB/ZeptoDB
          ref: ${{ github.event.client_payload.source_sha || 'main' }}
          path: zeptodb-source
          sparse-checkout: docs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync docs from ZeptoDB repo
        run: node scripts/sync-docs.mjs zeptodb-source/docs
        env:
          ZEPTODB_DOCS_PATH: zeptodb-source/docs
          ZEPTODB_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          ZEPTODB_SOURCE_REF: ${{ github.event.client_payload.source_ref || 'main' }}

      - name: Generate social preview images
        run: node scripts/growth-social-assets.mjs

      - name: Type-check site
        run: pnpm check

      - name: Build site
        run: npx astro build
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ vars.PUBLIC_GA_MEASUREMENT_ID }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
          PUBLIC_BING_SITE_VERIFICATION: ${{ vars.PUBLIC_BING_SITE_VERIFICATION }}

      - name: Validate rendered site
        run: pnpm qa:site

      - name: Validate growth assets
        run: pnpm growth:validate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
